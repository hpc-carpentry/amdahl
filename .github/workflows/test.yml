name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup openmpi
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: openmpi
      - run: mpirun --version
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .
      - run: amdahl --help
      # - run: mpirun -np 2 amdahl
